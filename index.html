<script>
// ============================================================================
// ENGINE.JS — Game Logic
// ============================================================================

const GAME_WIDTH = 480;
const GAME_HEIGHT = 270;
const BASE_SCROLL_SPEED = 80;
const BUS_SPEED_X = 200;
const FIXED_TIMESTEP = 1 / 60;
const MAX_ACCUMULATOR = 0.1;

const STATE = {
    TITLE: 'TITLE',
    INTRO: 'INTRO',
    PLAYING: 'PLAYING',
    STATION_STOP: 'STATION_STOP',
    HIT: 'HIT',
    LEVEL_COMPLETE: 'LEVEL_COMPLETE',
    WIN: 'WIN',
    GAME_OVER: 'GAME_OVER'
};

const LEVEL_1 = {
    duration: 90,
    scrollSpeed: BASE_SCROLL_SPEED,
    worldHeight: 4000,
    // Stations: world Y NEGATIVE so they scroll FROM ABOVE down toward the bus
    // Bus at screen y=170. Station at world y=-100 spawns at screen y=-100 (above screen).
    // As scrollY increases (world scrolls down), station moves down toward bus.
    // When scrollY=270 (bus near bottom), station at world y=-100 is at screen y=170 (bus level).
    stations: [
        { y: -100, collected: false, children: 1, x: 80 },   // Lane 0 - first stop
        { y: -700, collected: false, children: 1, x: 240 },  // Lane 1 - second stop
        { y: -1400, collected: false, children: 1, x: 400 }, // Lane 2 - third stop
        { y: -2100, collected: false, children: 1, x: 160 }, // Lane 0 - fourth stop
        { y: -2800, collected: false, children: 1, x: 320 }, // Lane 1 - fifth stop
    ],
    // Obstacles: world Y starts at -200 (just above visible area)
    // They scroll from top of screen downward as player progresses
    obstacles: [
        // Early obstacles (just below visible area)
        { type: 'cone', lane: 0, y: -180, width: 20, height: 30 },
        { type: 'cone', lane: 2, y: -300, width: 20, height: 30 },
        { type: 'cone', lane: 1, y: -420, width: 20, height: 30 },
        { type: 'cow', lane: 0, y: -600, direction: 1, width: 40, height: 30 },
        { type: 'cone', lane: 2, y: -800, width: 20, height: 30 },
        { type: 'cone', lane: 1, y: -1000, width: 20, height: 30 },
        { type: 'tree', lane: 0, y: -1200, width: 30, height: 40 },
        { type: 'cone', lane: 2, y: -1400, width: 20, height: 30 },
        { type: 'cow', lane: 1, y: -1600, direction: 1, width: 40, height: 30 },
        { type: 'cone', lane: 0, y: -1800, width: 20, height: 30 },
        { type: 'tree', lane: 2, y: -2000, width: 30, height: 40 },
        { type: 'cone', lane: 1, y: -2200, width: 20, height: 30 },
        { type: 'cow', lane: 0, y: -2500, direction: 1, width: 40, height: 30 },
    ],
    // Stars: spawn above screen (negative y) and scroll down
    stars: [
        { x: 80, y: -50 },
        { x: 400, y: -120 },
        { x: 240, y: -200 },
        { x: 80, y: -320 },
        { x: 400, y: -440 },
        { x: 240, y: -560 },
        { x: 80, y: -680 },
        { x: 400, y: -800 },
        { x: 240, y: -920 },
        { x: 80, y: -1040 },
        { x: 400, y: -1160 },
        { x: 240, y: -1280 },
        { x: 80, y: -1400 },
        { x: 400, y: -1520 },
        { x: 240, y: -1640 },
        { x: 80, y: -1800 },
    ],
    // Power-up spawn positions (type, x, worldY)
    powerups: [
        { type: 'shield', y: -380, x: 240 },
        { type: 'magnet', y: -900, x: 400 },
        { type: 'slowmo', y: -1500, x: 80 },
        { type: 'jump', y: -2100, x: 240 },
        { type: 'double', y: -2700, x: 400 },
    ]
};

// ============================================================================
// POWER-UP POOL
// ============================================================================

class PowerUpPool {
    // Durata power-up in millisecondi
    static DURATIONS = {
        shield: 5000,
        magnet: 8000,
        slowmo: 6000,
        jump: 0,
        double: 10000
    };

    constructor(maxSize = 10) {
        this.pool = [];
        this.active = [];
        for (let i = 0; i < maxSize; i++) {
            this.pool.push({ type: null, x: 0, y: 0, active: false, collected: false, rotation: 0 });
        }
    }

    spawn(type, x, worldY) {
        let pu = this.pool.pop();
        if (!pu) pu = { type: null, x: 0, y: 0, active: false, collected: false, rotation: 0 };
        pu.type = type;
        pu.x = x;
        pu.y = worldY;
        pu.active = true;
        pu.collected = false;
        pu.rotation = 0;
        this.active.push(pu);
    }

    update(dt, scrollSpeed) {
        for (let i = this.active.length - 1; i >= 0; i--) {
            const pu = this.active[i];
            pu.y += scrollSpeed * dt;
            pu.rotation += dt * 3;
            if (pu.y > GAME_HEIGHT + 50) {
                pu.active = false;
                this.active.splice(i, 1);
                this.pool.push(pu);
            }
        }
    }

    getActivePowerUps() { return this.active; }

    getHitbox(pu) {
        return { x: pu.x - 15, y: pu.y - 15, width: 30, height: 30 };
    }

    remove(pu) {
        const idx = this.active.indexOf(pu);
        if (idx !== -1) {
            this.active.splice(idx, 1);
            pu.active = false;
            this.pool.push(pu);
        }
    }
}

// ============================================================================
// INPUT CLASS
// ============================================================================

class Input {
    constructor() {
        this.keys = {};
        this.touchStartX = 0;
        this.touchCurrentX = 0;
        this.isTouching = false;
        this.dragDeltaX = 0;
        this.touchEnabled = true;
        this.keyboardEnabled = true;
        this._prevKeys = {};
        this._bindKeyboard();
        this._bindTouch();
    }

    _bindKeyboard() {
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
        });
    }

    _bindTouch() {
        window.addEventListener('touchstart', (e) => {
            if (!this.touchEnabled) return;
            this.isTouching = true;
            this.touchStartX = e.touches[0].clientX;
            this.touchCurrentX = this.touchStartX;
            this.dragDeltaX = 0;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!this.isTouching || !this.touchEnabled) return;
            this.touchCurrentX = e.touches[0].clientX;
            this.dragDeltaX = this.touchCurrentX - this.touchStartX;
        }, { passive: true });

        window.addEventListener('touchend', () => {
            this.isTouching = false;
            this.dragDeltaX = 0;
        });
    }

    isDown(code) { return !!this.keys[code]; }

    justPressed(code) {
        if (this.keys[code] && !this._prevKeys[code]) return true;
        return false;
    }

    flush() { this._prevKeys = { ...this.keys }; }

    isActionPressed() {
        return this.justPressed('Space') || this.justPressed('Enter');
    }

    getHorizontal() {
        let h = 0;
        if (this.keyboardEnabled) {
            if (this.isDown('ArrowLeft') || this.isDown('KeyA')) h -= 1;
            if (this.isDown('ArrowRight') || this.isDown('KeyD')) h += 1;
        }
        if (this.isTouching && this.touchEnabled) {
            if (this.dragDeltaX > 10) h = 1;
            else if (this.dragDeltaX < -10) h = -1;
        }
        return h;
    }
}

// ============================================================================
// BUS CLASS
// ============================================================================

class Bus {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 45;   // Vertical orientation: narrow width
        this.height = 80;  // Taller for upward-facing bus
        this.vx = 0;
        this.targetVx = 0;
        this.speed = BUS_SPEED_X;
        this.lane = 1;
        this.laneWidth = GAME_WIDTH / 3;
        this.isHit = false;
        this.isAtStation = false;
        this.doorsOpen = false;
        this.tilt = 0;
        this.blinkTimer = 0;
        this.blinkOn = false;
        this.hitTimer = 0;
        this.shieldActive = false;
        this.magnetActive = false;
    }

    update(dt, input) {
        if (this.isHit) {
            this.hitTimer -= dt;
            if (this.hitTimer <= 0) this.isHit = false;
            return;
        }

        this.blinkTimer += dt;
        if (this.blinkTimer > 0.3) {
            this.blinkTimer = 0;
            this.blinkOn = !this.blinkOn;
        }

        const h = input.getHorizontal();
        if (h !== 0) {
            this.targetVx = h * this.speed;
        } else {
            this.targetVx = 0;
        }

        const accel = 800;
        if (this.targetVx > this.vx) {
            this.vx = Math.min(this.targetVx, this.vx + accel * dt);
        } else if (this.targetVx < this.vx) {
            this.vx = Math.max(this.targetVx, this.vx - accel * dt);
        }

        this.x += this.vx * dt;
        this.x = Math.max(10, Math.min(GAME_WIDTH - this.width - 10, this.x));

        this.tilt = (this.vx / this.speed) * 0.1;
        this.lane = Math.floor((this.x + this.width / 2) / this.laneWidth);
    }

    openDoors() { this.doorsOpen = true; }
    closeDoors() { this.doorsOpen = false; }
    hit() { this.isHit = true; this.hitTimer = 0.5; }

    getHitbox() {
        const margin = 0.2;
        return {
            x: this.x + this.width * margin,
            y: this.y + this.height * margin,
            width: this.width * (1 - 2 * margin),
            height: this.height * (1 - 2 * margin)
        };
    }
}

// ============================================================================
// OBSTACLE POOL
// ============================================================================

class ObstaclePool {
    constructor(maxSize = 20) {
        this.pool = [];
        this.active = [];
        this.maxSize = maxSize;
        for (let i = 0; i < maxSize; i++) {
            this.pool.push(this._createEmpty());
        }
    }

    _createEmpty() {
        return { type: null, x: 0, y: 0, width: 0, height: 0, lane: 0, active: false, hit: false, direction: 1, vx: 0 };
    }

    spawn(type, lane, worldY, opts = {}) {
        let obs = this.pool.pop();
        if (!obs) obs = this._createEmpty();
        obs.type = type;
        obs.lane = lane;
        obs.active = true;
        obs.hit = false;
        obs.direction = opts.direction || 1;
        obs.vx = 0;

        if (type === 'cow') {
            obs.x = lane < 0 ? -40 : GAME_WIDTH + 40;
            obs.y = worldY;
            obs.width = opts.width || 40;
            obs.height = opts.height || 30;
            obs.vx = obs.direction * 50;
        } else if (type === 'cone') {
            const laneWidth = GAME_WIDTH / 3;
            obs.x = lane * laneWidth + laneWidth / 2 - 10;
            obs.y = worldY;
            obs.width = opts.width || 20;
            obs.height = opts.height || 30;
        } else if (type === 'tree') {
            const laneWidth = GAME_WIDTH / 3;
            obs.x = lane * laneWidth + laneWidth / 2 - 15;
            obs.y = worldY;
            obs.width = opts.width || 30;
            obs.height = opts.height || 40;
        }
        this.active.push(obs);
    }

    update(dt, scrollSpeed) {
        for (let i = this.active.length - 1; i >= 0; i--) {
            const obs = this.active[i];
            if (obs.type === 'cow') {
                obs.x += obs.vx * dt;
                obs.y += scrollSpeed * dt;
                if (obs.x < -100 || obs.x > GAME_WIDTH + 100) {
                    obs.active = false;
                    this.active.splice(i, 1);
                    this.pool.push(obs);
                }
            } else {
                obs.y += scrollSpeed * dt;
                if (obs.y > GAME_HEIGHT + 100) {
                    obs.active = false;
                    this.active.splice(i, 1);
                    this.pool.push(obs);
                }
            }
        }
    }

    getActiveObstacles() { return this.active; }

    getHitbox(obs) {
        return { x: obs.x, y: obs.y, width: obs.width, height: obs.height };
    }
}

// ============================================================================
// STAR POOL
// ============================================================================

class StarPool {
    constructor(maxSize = 10) {
        this.pool = [];
        this.active = [];
        for (let i = 0; i < maxSize; i++) {
            this.pool.push({ x: 0, y: 0, active: false, collected: false, rotation: 0, scale: 1 });
        }
    }

    spawn(x, worldY) {
        let star = this.pool.pop();
        if (!star) star = { x: 0, y: 0, active: false, collected: false, rotation: 0, scale: 1 };
        star.x = x;
        star.y = worldY;
        star.active = true;
        star.collected = false;
        star.rotation = 0;
        star.scale = 1;
        this.active.push(star);
    }

    update(dt, scrollSpeed) {
        for (let i = this.active.length - 1; i >= 0; i--) {
            const s = this.active[i];
            s.y += scrollSpeed * dt;
            s.rotation += dt * 2;
            s.scale = 1 + Math.sin(s.rotation * 2) * 0.1;
            if (s.y > GAME_HEIGHT + 50) {
                s.active = false;
                this.active.splice(i, 1);
                this.pool.push(s);
            }
        }
    }

    getActiveStars() { return this.active; }
    getHitbox(star) { return { x: star.x - 12, y: star.y - 12, width: 24, height: 24 }; }
}

// ============================================================================
// PARTICLE SYSTEM
// ============================================================================

class ParticleSystem {
    constructor() {
        this.particles = [];
        this.maxParticles = 200;
    }

    emit(x, y, count, config = {}) {
        const { speed = 100, angle = -Math.PI / 2, spread = Math.PI * 2,
            life = 1, color = '#FFD700', size = 4 } = config;
        for (let i = 0; i < count; i++) {
            if (this.particles.length >= this.maxParticles) break;
            const dir = angle + (Math.random() - 0.5) * spread;
            const spd = speed * (0.5 + Math.random() * 0.5);
            this.particles.push({
                x, y,
                vx: Math.cos(dir) * spd,
                vy: Math.sin(dir) * spd,
                life: life * (0.5 + Math.random() * 0.5),
                maxLife: life,
                color,
                size: size * (0.5 + Math.random() * 0.5)
            });
        }
    }

    emitSparkle(x, y) {
        this.emit(x, y, 15, { speed: 80, life: 0.6, color: '#FFD700', size: 4 });
        this.emit(x, y, 8, { speed: 50, angle: -Math.PI, life: 0.8, color: '#FFFACD', size: 3 });
    }

    emitHit(x, y) {
        this.emit(x, y, 10, { speed: 60, life: 0.4, color: '#FF6B35', size: 3 });
    }

    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 200 * dt;
            p.life -= dt;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }

    render(ctx) {
        for (const p of this.particles) {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }
}

// ============================================================================
// STATION CLASS
// ============================================================================

class Station {
    constructor(x, y, children = 1) {
        this.x = x;
        this.y = y;
        this.children = children;
        this.collected = false;
        this.childWaiting = true;
        this.timer = 0;
    }

    update(dt) {
        if (this.collected) return;
    }

    activateChild() { this.childWaiting = true; }
    getHitbox() { return { x: this.x - 30, y: this.y - 30, width: 60, height: 60 }; }
}

// ============================================================================
// SCORE MANAGER
// ============================================================================

class ScoreManager {
    constructor() {
        this.lives = 3;
        this.maxLives = 3;
        this.starsCollected = 0;
        this.friendsCollected = 0;
        this.totalFriends = 3;
    }

    loseLife() {
        this.lives = Math.max(0, this.lives - 1);
        return this.lives <= 0;
    }

    collectStar() { this.starsCollected++; }
    collectChild() { this.friendsCollected++; }
    addScore(points) { this.starsCollected += points; }
}

// ============================================================================
// GAME CLASS
// ============================================================================

class Game {
    constructor() {
        this.state = STATE.TITLE;
        this.stateTimer = 0;
        this.scrollY = 0;
        this.scrollSpeed = BASE_SCROLL_SPEED;
        this.levelTime = 0;
        this.bus = null;
        this.obstaclePool = null;
        this.starPool = null;
        this.powerUpPool = null;
        this.particles = null;
        this.stations = [];
        this.scoreManager = null;
        this.input = null;
        this.obstacleIndex = 0;
        this.starIndex = 0;
        this.powerUpIndex = 0;
        this.currentLevel = null;
        this._currentStation = null;
        this.currentLevel = LEVEL_1;
        // Power-up attivi: { type, remainingMs }
        this.activePowerUps = {};
        // Timer per auto-deattivazione (ms rimanenti)
        this.powerUpTimers = {};
        // Jump animation state
        this.jumpState = { active: false, startY: 0, targetY: 0, progress: 0 };
    }

    init() {
        this.input = new Input();
        this.bus = new Bus(GAME_WIDTH / 2 - 22, GAME_HEIGHT - 100);
        this.obstaclePool = new ObstaclePool(20);
        this.starPool = new StarPool(10);
        this.powerUpPool = new PowerUpPool(10);
        this.particles = new ParticleSystem();
        this.scoreManager = new ScoreManager();
        this.stations = this.currentLevel.stations.map(s => new Station(s.x, s.y, s.children));
        this.activePowerUps = {};
        this.powerUpTimers = {};
        this.jumpState = { active: false, startY: 0, targetY: 0, progress: 0 };
    }

    loadLevel(levelData) {
        this.scrollY = 0;
        this.scrollSpeed = levelData.scrollSpeed;
        this.levelTime = 0;
        this.obstacleIndex = 0;
        this.starIndex = 0;
        this.powerUpIndex = 0;
        this.bus = new Bus(GAME_WIDTH / 2 - 22, GAME_HEIGHT - 100);
        this.obstaclePool = new ObstaclePool(20);
        this.starPool = new StarPool(10);
        this.powerUpPool = new PowerUpPool(10);
        this.particles = new ParticleSystem();
        this.stations = levelData.stations.map(s => new Station(s.x, s.y, s.children));
        this.scoreManager = new ScoreManager();
        this.activePowerUps = {};
        this.powerUpTimers = {};
        this.jumpState = { active: false, startY: 0, targetY: 0, progress: 0 };
    }

    start() { this.state = STATE.INTRO; this.stateTimer = 0; }
    stop() { this.state = STATE.TITLE; }

    update(dt) {
        this.stateTimer += dt;
        this.input.flush();

        switch (this.state) {
            case STATE.TITLE: this.updateTitle(dt); break;
            case STATE.INTRO: this.updateIntro(dt); break;
            case STATE.PLAYING: this.updatePlaying(dt); break;
            case STATE.STATION_STOP: this.updateStationStop(dt); break;
            case STATE.HIT: this.updateHit(dt); break;
            case STATE.LEVEL_COMPLETE: this.updateLevelComplete(dt); break;
            case STATE.WIN: this.updateWin(dt); break;
            case STATE.GAME_OVER: this.updateGameOver(dt); break;
        }
    }

    updateTitle(dt) {
        if (this.stateTimer > 2 || this.input.isActionPressed() || this.input.isTouching) {
            this.loadLevel(LEVEL_1);
            this.transitionTo(STATE.PLAYING);
        }
    }

    updateIntro(dt) {
        if (this.stateTimer > 3 || this.input.isActionPressed() || this.input.isTouching) {
            this.loadLevel(LEVEL_1);
            this.transitionTo(STATE.PLAYING);
        }
    }

    updatePlaying(dt) {
        // Calcola scrollSpeed effettivo (slow-mo)
        const effectiveSpeed = this.activePowerUps.slowmo
            ? this.scrollSpeed * 0.4
            : this.scrollSpeed;

        this.scrollY += effectiveSpeed * dt;
        this.levelTime += dt;
        this.bus.update(dt, this.input);
        this.spawnObstacles();
        this.spawnStars();
        this.spawnPowerUps();
        this.obstaclePool.update(dt, effectiveSpeed);
        this.starPool.update(dt, effectiveSpeed);
        this.powerUpPool.update(dt, effectiveSpeed);
        this.updatePowerUps(dt);
        this.updateJump(dt);
        this.particles.update(dt);
        for (let station of this.stations) station.update(dt);
        this.checkStationProximity();
        this.checkCollisions();
        this.checkPowerUpCollisions();
        if (this.scrollY >= this.currentLevel.worldHeight) {
            this.transitionTo(STATE.LEVEL_COMPLETE);
        }
    }

    updateStationStop(dt) {
        this.bus.update(dt, this.input);
        this.particles.update(dt);
        for (let station of this.stations) station.update(dt);
        if (this.stateTimer > 2) {
            const currentStation = this.getCurrentStation();
            if (currentStation && !currentStation.collected) {
                currentStation.collected = true;
                this.scoreManager.collectChild();
                this.particles.emitSparkle(this.bus.x + this.bus.width / 2, this.bus.y);
            }
            this.bus.closeDoors();
            this.transitionTo(STATE.PLAYING);
        }
    }

    updateHit(dt) {
        this.bus.update(dt, this.input);
        this.particles.update(dt);
        this.obstaclePool.update(dt, this.scrollSpeed * 0.5);
        if (this.stateTimer > 0.5) {
            if (this.scoreManager.lives <= 0) {
                this.transitionTo(STATE.GAME_OVER);
            } else {
                this.transitionTo(STATE.PLAYING);
            }
        }
    }

    updateGameOver(dt) {
        this.particles.update(dt);
        if (this.stateTimer > 1 && (this.input.isActionPressed() || this.input.isTouching)) {
            this.loadLevel(LEVEL_1);
            this.scrollY = 0;
            this.transitionTo(STATE.PLAYING);
        }
    }

    updateLevelComplete(dt) {
        this.particles.update(dt);
        if (this.stateTimer > 3) {
            const allStationsComplete = this.stations.every(s => s.collected);
            if (allStationsComplete) this.scoreManager.addScore(500);
            this.transitionTo(STATE.WIN);
        }
    }

    updateWin(dt) {
        this.particles.update(dt);
        if (this.stateTimer > 5 && (this.input.isActionPressed() || this.input.isTouching)) {
            this.transitionTo(STATE.TITLE);
        }
    }

    spawnObstacles() {
        if (!this.currentLevel) return;
        while (this.obstacleIndex < this.currentLevel.obstacles.length) {
            const obs = this.currentLevel.obstacles[this.obstacleIndex];
            if (-this.scrollY <= obs.y + 300) {
                this.obstaclePool.spawn(obs.type, obs.lane, obs.y, {
                    width: obs.width, height: obs.height
                });
                this.obstacleIndex++;
            } else break;
        }
    }

    spawnStars() {
        if (!this.currentLevel) return;
        while (this.starIndex < this.currentLevel.stars.length) {
            const star = this.currentLevel.stars[this.starIndex];
            if (-this.scrollY <= star.y + 300) {
                this.starPool.spawn(star.x, star.y);
                this.starIndex++;
            } else break;
        }
    }

    spawnPowerUps() {
        if (!this.currentLevel || !this.currentLevel.powerups) return;
        while (this.powerUpIndex < this.currentLevel.powerups.length) {
            const pu = this.currentLevel.powerups[this.powerUpIndex];
            if (-this.scrollY <= pu.y + 300) {
                this.powerUpPool.spawn(pu.type, pu.x, pu.y);
                this.powerUpIndex++;
            } else break;
        }
    }

    activatePowerUp(type) {
        this.activePowerUps[type] = true;
        const duration = PowerUpPool.DURATIONS[type];
        if (duration > 0) {
            this.powerUpTimers[type] = duration;
        }
        // Super Salto: esegue subito il salto
        if (type === 'jump') {
            this.jumpState.active = true;
            this.jumpState.startY = this.bus.y;
            this.jumpState.targetY = this.bus.y - 60;
            this.jumpState.progress = 0;
        }
    }

    deactivatePowerUp(type) {
        delete this.activePowerUps[type];
        delete this.powerUpTimers[type];
    }

    updatePowerUps(dt) {
        const dtMs = dt * 1000;
        for (const type of Object.keys(this.powerUpTimers)) {
            this.powerUpTimers[type] -= dtMs;
            if (this.powerUpTimers[type] <= 0) {
                this.deactivatePowerUp(type);
            }
        }
    }

    updateJump(dt) {
        if (!this.jumpState.active) return;
        this.jumpState.progress += dt * 3;
        if (this.jumpState.progress >= 1) {
            this.jumpState.progress = 1;
            this.jumpState.active = false;
            this.bus.y = this.jumpState.startY;
        } else {
            // Parabola: su e poi giu
            const t = this.jumpState.progress;
            const height = Math.sin(t * Math.PI) * 60;
            this.bus.y = this.jumpState.startY - height;
        }
    }

    checkPowerUpCollisions() {
        if (this.bus.isHit) return;
        const busHitbox = this.bus.getHitbox();
        const powerUps = this.powerUpPool.getActivePowerUps();
        for (let pu of powerUps) {
            const puHitbox = this.powerUpPool.getHitbox(pu);
            if (this.aabbCollision(busHitbox, puHitbox)) {
                pu.collected = true;
                this.powerUpPool.remove(pu);
                this.activatePowerUp(pu.type);
                // Particelle colorate in base al tipo
                const colors = {
                    shield: COLORS.SHIELD_BLUE,
                    magnet: COLORS.MAGNET_RED,
                    slowmo: COLORS.SLOWMO_PURPLE,
                    jump: COLORS.JUMP_GREEN,
                    double: COLORS.DOUBLE_GOLD
                };
                this.particles.emit(pu.x, pu.y, 15, {
                    speed: 80, life: 0.6, color: colors[pu.type] || '#FFFFFF', size: 5
                });
            }
        }
    }

    checkStationProximity() {
        if (this.bus.isHit) return;
        for (let station of this.stations) {
            if (station.collected) continue;

            // Calculate SCREEN distance (both bus and station positions are screen-relative)
            const busScreenY = this.bus.y + this.bus.height / 2;
            const stationScreenY = station.y + this.scrollY;
            const distanceY = Math.abs(busScreenY - stationScreenY);

            // Check if bus is aligned with station (same lane approximation)
            const busCenterX = this.bus.x + this.bus.width / 2;
            const laneWidth = GAME_WIDTH / 3;
            const busLane = Math.floor(busCenterX / laneWidth);
            const stationLane = station.x < laneWidth ? 0 : (station.x < laneWidth * 2 ? 1 : 2);
            const sameLane = Math.abs(busLane - stationLane) <= 1;

            // Stop if bus is close enough and in roughly the right lane
            // Use large range (250px) because station passes quickly on screen
            if (distanceY < 250 && sameLane && Math.abs(this.bus.vx) < 30) {
                this.bus.isAtStation = true;
                this.bus.openDoors();
                this.bus.vx = 0;
                station.activateChild();
                this.setCurrentStation(station);
                this.transitionTo(STATE.STATION_STOP);
                return;
            }

            // Collision: hit station while in wrong lane or moving too fast
            if (distanceY < 80 && !station.collected) {
                this.scoreManager.loseLife();
                this.particles.emitHit(this.bus.x + this.bus.width / 2, this.bus.y);
                this.bus.hit();
                this.transitionTo(STATE.HIT);
                return;
            }
        }
    }

    checkCollisions() {
        if (this.bus.isHit) return;
        const busHitbox = this.bus.getHitbox();
        const obstacles = this.obstaclePool.getActiveObstacles();
        for (let obs of obstacles) {
            if (obs.hit) continue;
            const obsHitbox = this.obstaclePool.getHitbox(obs);
            if (this.aabbCollision(busHitbox, obsHitbox)) {
                obs.hit = true;
                // Se scudo attivo, ignora collisione
                if (this.activePowerUps.shield) {
                    this.particles.emit(obs.x + obs.width / 2, obs.y + obs.height / 2, 8,
                        { speed: 60, life: 0.4, color: COLORS.SHIELD_BLUE, size: 3 });
                    continue;
                }
                this.scoreManager.loseLife();
                this.particles.emitHit(obs.x + obs.width / 2, obs.y + obs.height / 2);
                this.bus.hit();
                this.transitionTo(STATE.HIT);
                return;
            }
        }
        const stars = this.starPool.getActiveStars();
        const busCenterX = this.bus.x + this.bus.width / 2;
        const busCenterY = this.bus.y + this.bus.height / 2;
        for (let star of stars) {
            // Magnet effect: attrazione stelle verso il bus
            if (this.activePowerUps.magnet) {
                const dx = busCenterX - star.x;
                const dy = busCenterY - star.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    const force = 300 * dt;
                    star.x += (dx / dist) * force;
                    star.y += (dy / dist) * force;
                }
            }
            const starHitbox = this.starPool.getHitbox(star);
            if (this.aabbCollision(busHitbox, starHitbox)) {
                star.collected = true;
                star.active = false;
                const starIdx = this.starPool.active.indexOf(star);
                if (starIdx !== -1) this.starPool.active.splice(starIdx, 1);
                // Stelle x2
                const points = this.activePowerUps.double ? 2 : 1;
                for (let i = 0; i < points; i++) {
                    this.scoreManager.collectStar();
                }
                this.particles.emitSparkle(star.x, star.y);
            }
        }
    }

    aabbCollision(a, b) {
        return a.x < b.x + b.width && a.x + a.width > b.x &&
               a.y < b.y + b.height && a.y + a.height > b.y;
    }

    transitionTo(newState) {
        this.state = newState;
        this.stateTimer = 0;
    }

    getCurrentStation() { return this._currentStation || null; }
    setCurrentStation(station) { this._currentStation = station; }

    getState() { return this.state; }
    getScrollY() { return this.scrollY; }
    getBus() { return this.bus; }
    getObstaclePool() { return this.obstaclePool; }
    getStarPool() { return this.starPool; }
    getParticles() { return this.particles; }
    getStations() { return this.stations; }
    getScoreManager() { return this.scoreManager; }
    getPowerUpPool() { return this.powerUpPool; }
    getActivePowerUps() { return this.activePowerUps; }
    isPowerUpActive(type) { return !!this.activePowerUps[type]; }
}

    YELLOW_BUS_DARK: '#E5A800',
    YELLOW_BUS_LIGHT: '#FFE066',
    ROAD: '#4A4A4A',
    ROAD_LINE: '#F7C41F',
    SIDEWALK: '#B8D4A8',
    GRASS: '#6DC04A',
    SKY_TOP: '#87CEEB',
    SKY_BOTTOM: '#C8E8F8',
    STOP_SIGN: '#E53935',
    STOP_POLE: '#8B8B8B',
    CHILD_SKIN: '#F4A460',
    CHILD_SHIRT: '#42A5F5',
    CHILD_HAT: '#E53935',
    CONE: '#FF6B35',
    CONE_STRIPE: '#FFFFFF',
    COW: '#F5F5F5',
    COW_SPOTS: '#8B4513',
    TREE_TRUNK: '#8B6914',
    TREE_LEAVES: '#228B22',
    STAR: '#FFD700',
    STAR_SHINE: '#FFFACD',
    WINDOW_BLUE: '#5DADE2',
    WHEEL_COLOR: '#333333',
    HEART_RED: '#E53935',

    // Power-up colors

};

const _renderGameWidth = 480;
const _renderGameHeight = 270;

// ============================================================================
// RENDERING — Utility
// ============================================================================

function _rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function _star(ctx, cx, cy, spikes, outerR, innerR, rot) {
    let r = (Math.PI / 2 * 3) + rot;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (let i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(r) * outerR, cy + Math.sin(r) * outerR);
        r += step;
        ctx.lineTo(cx + Math.cos(r) * innerR, cy + Math.sin(r) * innerR);
        r += step;
    }
    ctx.closePath();
}

// ============================================================================
// RENDERING — Sky
// ============================================================================

function renderSky(ctx, scrollY) {
    // Cheerful gradient sky - fills area ABOVE the road
    // Road/grass starts at y=82, so sky is from y=0 to y=82
    const skyBottom = 82;
    const g = ctx.createLinearGradient(0, 0, 0, skyBottom);
    g.addColorStop(0, '#5DADE2');   // Bright sky blue at top
    g.addColorStop(0.6, '#85C1E9'); // Lighter blue middle
    g.addColorStop(1, '#AED6F1');    // Very light blue near horizon
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, _renderGameWidth, skyBottom);

    // Sun (fixed position, top-left area, within sky)
    const sunX = 50;
    const sunY = 20;
    ctx.fillStyle = 'rgba(255, 249, 196, 0.4)';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 24, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF9C4';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFF176';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 12, 0, Math.PI * 2);
    ctx.fill();

    // Clouds (within sky area, subtle parallax)
    const cloudData = [
        { x: 100, y: 25, s: 1.0 },
        { x: 260, y: 45, s: 0.8 },
        { x: 380, y: 20, s: 1.1 },
        { x: 160, y: 60, s: 0.7 }
    ];
    for (let i = 0; i < cloudData.length; i++) {
        const cd = cloudData[i];
        const offset = ((scrollY * 0.1) + i * 20) % 60 - 10;
        const cy = cd.y + offset;
        const s = cd.s;
        ctx.fillStyle = '#FFFFFF';
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(cd.x, cy, 12 * s, 0, Math.PI * 2);
        ctx.arc(cd.x + 18 * s, cy - 3 * s, 15 * s, 0, Math.PI * 2);
        ctx.arc(cd.x + 36 * s, cy, 11 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

// ============================================================================
// RENDERING — Road
// ============================================================================

function renderRoad(ctx, scrollY) {
    // Layout: sky=0-82, grass strip=82-92, sidewalk=92-102, road=102-270

    // Grass strip (between sky and sidewalk)
    ctx.fillStyle = '#66BB6A';  // Cheerful green
    ctx.fillRect(0, 82, _renderGameWidth, 10);

    // Grass texture (small stripes within grass area)
    ctx.fillStyle = '#81C784';
    const grassStripeOffset = (scrollY * 0.5) % 20;
    for (let i = 0; i < 8; i++) {
        const gy = 82 + ((i * 20 + grassStripeOffset) % 20);
        if (gy >= 82 && gy < 92) {
            ctx.fillRect(0, gy, _renderGameWidth, 4);
        }
    }

    // Sidewalk (lighter gray)
    ctx.fillStyle = '#BDBDBD';
    ctx.fillRect(0, 92, _renderGameWidth, 10);

    // Sidewalk tile lines
    ctx.strokeStyle = '#9E9E9E';
    ctx.lineWidth = 1;
    for (let x = 0; x < _renderGameWidth; x += 30) {
        ctx.beginPath();
        ctx.moveTo(x, 92);
        ctx.lineTo(x, 102);
        ctx.stroke();
    }

    // Road (from y=102 to bottom)
    const roadTop = 102;
    const roadH = _renderGameHeight - roadTop;
    ctx.fillStyle = '#546E7A';  // Nice blue-gray asphalt
    ctx.fillRect(0, roadTop, _renderGameWidth, roadH);

    // Road edges (white lines)
    ctx.fillStyle = '#ECEFF1';
    ctx.fillRect(0, roadTop, _renderGameWidth, 3);
    ctx.fillRect(0, _renderGameHeight - 3, _renderGameWidth, 3);

    // Lane dividers (dashed yellow)
    const laneW = _renderGameWidth / 3;
    ctx.strokeStyle = '#FFEB3B';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 15]);
    ctx.lineDashOffset = -(scrollY % 35);
    for (let i = 1; i < 3; i++) {
        const x = i * laneW;
        ctx.beginPath();
        ctx.moveTo(x, roadTop + 5);
        ctx.lineTo(x, _renderGameHeight - 5);
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // Bottom grass (after road, for visual continuity)
    ctx.fillStyle = '#66BB6A';
    ctx.fillRect(0, _renderGameHeight, _renderGameWidth, 20);
}

// ============================================================================
// RENDERING — Bus (TOP-DOWN VIEW, driver at bottom, nose at top)
// ============================================================================

function renderBus(ctx, bus) {
    const bw = 44;  // width
    const bh = 72;  // height (taller than wide for vertical orientation)
    const cx = bus.x + bus.width / 2;
    const cy = bus.y + bus.height / 2;

    ctx.save();
    ctx.translate(cx, cy);

    // Tilt based on movement
    const tiltAmount = (bus.vx / bus.speed) * 0.08;
    ctx.rotate(tiltAmount);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(3, 5, bw / 2 + 2, bh / 2 - 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // === BODY ===
    ctx.fillStyle = COLORS.YELLOW_BUS;
    _rrect(ctx, -bw / 2, -bh / 2, bw, bh, 10);
    ctx.fill();

    // Darker stripe at bottom (where driver sits)
    ctx.fillStyle = COLORS.YELLOW_BUS_DARK;
    _rrect(ctx, -bw / 2 + 4, bh / 2 - 14, bw - 8, 10, 4);
    ctx.fill();

    // Lighter stripe at top (nose)
    ctx.fillStyle = COLORS.YELLOW_BUS_LIGHT;
    _rrect(ctx, -bw / 2 + 4, -bh / 2 + 4, bw - 8, 8, 4);
    ctx.fill();

    // === WINDSHIELD (top of bus, front) ===
    ctx.fillStyle = '#AED6F1';
    _rrect(ctx, -bw / 2 + 6, -bh / 2 + 14, bw - 12, 12, 3);
    ctx.fill();
    ctx.strokeStyle = '#85C1E9';
    ctx.lineWidth = 1;
    ctx.stroke();

    // === PASSENGER WINDOWS (3 windows below windshield) ===
    ctx.fillStyle = '#AED6F1';
    for (let i = 0; i < 3; i++) {
        const wy = -bh / 2 + 30 + i * 12;
        _rrect(ctx, -bw / 2 + 6, wy, bw - 12, 8, 2);
        ctx.fill();
        ctx.strokeStyle = '#85C1E9';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    // === DOOR (right side) ===
    if (bus.doorsOpen) {
        ctx.fillStyle = '#333';
        _rrect(ctx, bw / 2 - 10, bh / 2 - 26, 8, 18, 2);
        ctx.fill();
    }

    // === DRIVER SECTION (bottom of bus) ===
    // Driver seat area
    ctx.fillStyle = '#2C3E50';
    _rrect(ctx, -bw / 2 + 4, bh / 2 - 20, bw - 8, 16, 4);
    ctx.fill();

    // Leone's head (visible from top)
    ctx.fillStyle = COLORS.CHILD_SKIN;
    ctx.beginPath();
    ctx.arc(0, bh / 2 - 12, 6, 0, Math.PI * 2);
    ctx.fill();

    // Leone's red cap
    ctx.fillStyle = COLORS.CHILD_HAT;
    ctx.beginPath();
    ctx.arc(0, bh / 2 - 14, 5, Math.PI, Math.PI * 2);
    ctx.fill();

    // Leone's eyes (tiny dots)
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(-2, bh / 2 - 12, 1, 0, Math.PI * 2);
    ctx.arc(2, bh / 2 - 12, 1, 0, Math.PI * 2);
    ctx.fill();

    // === WHEELS (left and right sides) ===
    ctx.fillStyle = '#222';
    // Left wheel
    _rrect(ctx, -bw / 2 - 5, -bh / 4, 6, 16, 3);
    ctx.fill();
    // Right wheel
    _rrect(ctx, bw / 2 - 1, -bh / 4, 6, 16, 3);
    ctx.fill();

    // Wheel highlights
    ctx.fillStyle = '#444';
    ctx.fillRect(-bw / 2 - 4, -bh / 4 + 2, 4, 4);
    ctx.fillRect(bw / 2 + 1, -bh / 4 + 2, 4, 4);

    // === HEADLIGHTS (top front) ===
    ctx.fillStyle = '#FFF9C4';
    ctx.beginPath();
    ctx.arc(-bw / 2 + 10, -bh / 2 + 6, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bw / 2 - 10, -bh / 2 + 6, 3, 0, Math.PI * 2);
    ctx.fill();

    // Headlight glow
    ctx.fillStyle = 'rgba(255, 249, 196, 0.3)';
    ctx.beginPath();
    ctx.arc(-bw / 2 + 10, -bh / 2 + 6, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bw / 2 - 10, -bh / 2 + 6, 6, 0, Math.PI * 2);
    ctx.fill();

    // === TURN SIGNALS (blink when at station) ===
    if (bus.doorsOpen || bus.isAtStation) {
        if (bus.blinkOn) {
            ctx.fillStyle = '#FFB300';
            ctx.beginPath();
            ctx.arc(-bw / 2 + 5, -bh / 2 + 6, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bw / 2 - 5, -bh / 2 + 6, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // === POWER-UP EFFECTS ===
    // Shield glow
    if (bus.shieldActive) {
        ctx.strokeStyle = COLORS.SHIELD_BLUE;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 100) * 0.3;
        ctx.beginPath();
        ctx.arc(0, 0, bw / 2 + 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // Magnet effect
    if (bus.magnetActive) {
        ctx.strokeStyle = COLORS.MAGNET_RED;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.4;
        for (let r = 20; r <= 40; r += 10) {
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    ctx.restore();
}

// ============================================================================
// RENDERING — Cone
// ============================================================================

function renderCone(ctx, x, y) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 10, y + 30, 12, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cone body (orange with white stripe)
    ctx.fillStyle = COLORS.CONE;
    ctx.beginPath();
    ctx.moveTo(x + 10, y);
    ctx.lineTo(x + 22, y + 30);
    ctx.lineTo(x - 2, y + 30);
    ctx.closePath();
    ctx.fill();

    // White reflective stripe
    ctx.fillStyle = '#FFF';
    ctx.fillRect(x + 3, y + 12, 14, 5);

    // Small highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 2);
    ctx.lineTo(x + 6, y + 10);
    ctx.lineTo(x + 14, y + 10);
    ctx.closePath();
    ctx.fill();
}

// ============================================================================
// RENDERING — Cow
// ============================================================================

function renderCow(ctx, x, y, dir = 1) {
    ctx.save();
    ctx.translate(x, y);
    if (dir < 0) { ctx.scale(-1, 1); ctx.translate(-40, 0); }

    ctx.fillStyle = COLORS.SHADOW;
    ctx.beginPath();
    ctx.ellipse(20, 28, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#F8F8F8';
    ctx.beginPath();
    ctx.ellipse(20, 18, 18, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cute spots
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(15, 14, 5, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(28, 18, 4, 3, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(12, 22, 3, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#F8F8F8';
    ctx.beginPath();
    ctx.ellipse(38, 22, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pink nose/muzzle
    ctx.fillStyle = '#FFB6C1';
    ctx.beginPath();
    ctx.ellipse(44, 23, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nostrils
    ctx.fillStyle = '#CC8B9A';
    ctx.beginPath();
    ctx.arc(43, 22, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(45, 22, 1, 0, Math.PI * 2);
    ctx.fill();

    // Cute eyes
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(40, 20, 2, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(40.5, 19.5, 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = '#F8F8F8';
    ctx.beginPath();
    ctx.ellipse(36, 12, 4, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(42, 12, 4, 6, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Horns (small)
    ctx.fillStyle = '#F4D03F';
    ctx.beginPath();
    ctx.ellipse(36, 8, 2, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(42, 8, 2, 5, 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

// ============================================================================
// RENDERING — Tree
// ============================================================================

function renderTree(ctx, x, y) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 15, y + 42, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Trunk
    ctx.fillStyle = '#8B5A2B';
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 40);
    ctx.lineTo(x + 12, y + 18);
    ctx.lineTo(x + 18, y + 18);
    ctx.lineTo(x + 20, y + 40);
    ctx.closePath();
    ctx.fill();

    // Trunk highlight
    ctx.fillStyle = '#A0522D';
    ctx.fillRect(x + 12, y + 20, 3, 18);

    // Main foliage (big round green)
    ctx.fillStyle = COLORS.TREE_LEAVES;
    ctx.beginPath();
    ctx.arc(x + 15, y + 10, 18, 0, Math.PI * 2);
    ctx.fill();

    // Secondary foliage blobs
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.arc(x + 3, y + 16, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 27, y + 14, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 15, y + 3, 12, 0, Math.PI * 2);
    ctx.fill();

    // Highlight on top foliage
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(x + 10, y + 5, 8, 0, Math.PI * 2);
    ctx.fill();

    // Small red apples for cuteness
    ctx.fillStyle = '#E53935';
    ctx.beginPath();
    ctx.arc(x + 8, y + 18, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 22, y + 10, 3, 0, Math.PI * 2);
    ctx.fill();
}

// ============================================================================
// RENDERING — Star
// ============================================================================

function renderStarShape(ctx, star) {
    ctx.save();
    ctx.translate(star.x, star.y);
    ctx.rotate(star.rotation);
    ctx.scale(star.scale, star.scale);

    ctx.fillStyle = COLORS.STAR;
    _star(ctx, 0, 0, 5, 12, 5, 0);
    ctx.fill();

    ctx.fillStyle = COLORS.STAR_SHINE;
    ctx.globalAlpha = 0.5;
    _star(ctx, 0, 0, 5, 6, 2.5, 0);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
}

// ============================================================================
// RENDERING — Station
// ============================================================================

function renderStationShape(ctx, station) {
    const x = station.x;
    const y = station.y;

    ctx.fillStyle = COLORS.SHADOW;
    ctx.beginPath();
    ctx.ellipse(x, y + 28, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = COLORS.STOP_POLE;
    ctx.fillRect(x - 3, y - 20, 6, 48);

    ctx.fillStyle = COLORS.STOP_SIGN;
    ctx.beginPath();
    ctx.arc(x, y - 20, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('F', x, y - 20);

    if (station.childWaiting && !station.collected) {
        const cx = x + 20;
        const cy = y + 10;
        ctx.fillStyle = COLORS.CHILD_SKIN;
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.CHILD_SHIRT;
        ctx.beginPath();
        ctx.arc(cx, cy + 10, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.CHILD_HAT;
        ctx.beginPath();
        ctx.arc(cx, cy - 3, 5, Math.PI, Math.PI * 2);
        ctx.fill();
    }
}

// ============================================================================
// RENDERING — Power-Up
// ============================================================================

function renderPowerUpShape(ctx, pu) {
    ctx.save();
    ctx.translate(pu.x, pu.y);
    ctx.rotate(pu.rotation);

    const size = 15;
    if (pu.type === 'shield') {
        // Scudo: cerchio blu con icona scudo
        ctx.fillStyle = COLORS.SHIELD_BLUE;
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(8, 2);
        ctx.lineTo(4, 2);
        ctx.lineTo(4, 8);
        ctx.lineTo(-4, 8);
        ctx.lineTo(-4, 2);
        ctx.lineTo(-8, 2);
        ctx.closePath();
        ctx.fill();
    } else if (pu.type === 'magnet') {
        // Magnete: ferro di cavallo rosso con U
        ctx.fillStyle = COLORS.MAGNET_RED;
        ctx.beginPath();
        ctx.arc(0, 4, size, Math.PI, 0, false);
        ctx.lineTo(size, -8);
        ctx.lineTo(size * 0.5, -8);
        ctx.lineTo(size * 0.5, -2);
        ctx.arc(0, -2, size * 0.5, 0, Math.PI, false);
        ctx.lineTo(-size * 0.5, -2);
        ctx.lineTo(-size * 0.5, -8);
        ctx.lineTo(-size, -8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('U', 0, 2);
    } else if (pu.type === 'slowmo') {
        // Tempo lento: orologio viola
        ctx.fillStyle = COLORS.SLOWMO_PURPLE;
        ctx.beginPath();
        ctx.arc(0, 0, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, size - 4, 0, Math.PI * 2);
        ctx.stroke();
        // Lancette
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -6);
        ctx.moveTo(0, 0);
        ctx.lineTo(4, 2);
        ctx.stroke();
    } else if (pu.type === 'jump') {
        // Super salto: freccia su verde
        ctx.fillStyle = COLORS.JUMP_GREEN;
        ctx.beginPath();
        ctx.moveTo(0, -size);
        ctx.lineTo(size, 4);
        ctx.lineTo(size * 0.4, 4);
        ctx.lineTo(size * 0.4, size);
        ctx.lineTo(-size * 0.4, size);
        ctx.lineTo(-size * 0.4, 4);
        ctx.lineTo(-size, 4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('▲', 0, 2);
    } else if (pu.type === 'double') {
        // Stelle x2: stella doppia dorata
        ctx.fillStyle = COLORS.DOUBLE_GOLD;
        _star(ctx, -6, 0, 5, 10, 4, 0);
        ctx.fill();
        _star(ctx, 6, 0, 5, 10, 4, 0.3);
        ctx.fill();
    }

    ctx.restore();
}

// Effetti visivi per power-up attivi
function renderPowerUpEffects(ctx, game) {
    const bus = game.getBus();
    const activePowerUps = game.getActivePowerUps();
    const busCenterX = bus.x + bus.width / 2;
    const busCenterY = bus.y + bus.height / 2;

    // Scudo: alone blu attorno al bus
    if (activePowerUps.shield) {
        ctx.save();
        ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 100) * 0.1;
        ctx.strokeStyle = COLORS.SHIELD_BLUE;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(busCenterX, busCenterY, 50, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.15 + Math.sin(Date.now() / 80) * 0.05;
        ctx.fillStyle = COLORS.SHIELD_BLUE;
        ctx.beginPath();
        ctx.arc(busCenterX, busCenterY, 55, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // Magnete: linee magnetiche dal bus
    if (activePowerUps.magnet) {
        ctx.save();
        ctx.strokeStyle = COLORS.MAGNET_RED;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 60) * 0.2;
        for (let i = 0; i < 6; i++) {
            const angle = (Date.now() / 500 + i * Math.PI / 3) % (Math.PI * 2);
            const r1 = 30;
            const r2 = 80;
            ctx.beginPath();
            ctx.moveTo(busCenterX + Math.cos(angle) * r1, busCenterY + Math.sin(angle) * r1);
            ctx.lineTo(busCenterX + Math.cos(angle) * r2, busCenterY + Math.sin(angle) * r2);
            ctx.stroke();
        }
        ctx.restore();
    }

    // Tempo lento: vignette sfocata ai bordi
    if (activePowerUps.slowmo) {
        ctx.save();
        const g = ctx.createRadialGradient(
            busCenterX, busCenterY, 50,
            busCenterX, busCenterY, 200
        );
        g.addColorStop(0, 'rgba(156, 39, 176, 0)');
        g.addColorStop(0.5, 'rgba(156, 39, 176, 0.1)');
        g.addColorStop(1, 'rgba(156, 39, 176, 0.4)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, _renderGameWidth, _renderGameHeight);
        ctx.restore();
    }

    // Stelle x2: aura dorata attorno alle stelle sullo schermo
    if (activePowerUps.double) {
        for (let star of game.getStarPool().getActiveStars()) {
            ctx.save();
            ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 80) * 0.1;
            ctx.fillStyle = COLORS.DOUBLE_GOLD;
            ctx.beginPath();
            ctx.arc(star.x, star.y, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }
}

// UI indicator per power-up attivi
function renderPowerUpIndicators(ctx, game) {
    const activePowerUps = game.activePowerUps;
    const powerUpTimers = game.powerUpTimers;
    let yOffset = 45;

    // Iconine in alto a destra per power-up temporizzati (shield, magnet, slowmo, double)
    const timedPowerUps = ['shield', 'magnet', 'slowmo', 'double'];
    const labels = { shield: '🛡️', magnet: '🧲', slowmo: '⏰', double: '✨' };
    const colors = {
        shield: COLORS.SHIELD_BLUE,
        magnet: COLORS.MAGNET_RED,
        slowmo: COLORS.SLOWMO_PURPLE,
        double: COLORS.DOUBLE_GOLD
    };

    for (const type of timedPowerUps) {
        if (activePowerUps[type]) {
            const remaining = powerUpTimers[type] ? Math.ceil(powerUpTimers[type] / 1000) : 0;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(_renderGameWidth - 65, yOffset - 10, 60, 14);
            ctx.fillStyle = colors[type] || '#FFFFFF';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(labels[type] + ' ' + remaining + 's', _renderGameWidth - 60, yOffset);
            yOffset += 16;
        }
    }
}

// RENDERING — UI
// ============================================================================

function renderHearts(ctx, lives, maxLives, x, y) {
    for (let i = 0; i < maxLives; i++) {
        const hx = x + i * 16;
        ctx.fillStyle = i < lives ? COLORS.HEART_RED : COLORS.HEART_EMPTY;
        ctx.font = '12px Arial';
        ctx.fillText('❤', hx, y);

}

function renderStarCounter(ctx, count, x, y) {
    ctx.fillStyle = COLORS.STAR;
    _star(ctx, x, y, 5, 7, 3, 0);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

}

function renderFriendCounter(ctx, friends, total, x, y) {

    ctx.font = 'bold 11px Arial';

// ============================================================================
// RENDERING — Hit Overlay
// ============================================================================

function renderHitOverlay(ctx, intensity, flashAlpha) {
    if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${flashAlpha})`;
        ctx.fillRect(0, 0, _renderGameWidth, _renderGameHeight);
    }
}

// ============================================================================
// RENDERING — Main render function
// ============================================================================

function doRender(ctx, game) {
    const scrollY = game.scrollY;
    const scrollOffset = scrollY;
    const state = game.getState();

    ctx.save();
    ctx.imageSmoothingEnabled = false;

    // Hit flash
    if (state === STATE.HIT && game.stateTimer < 0.5) {
        const flash = Math.sin(game.stateTimer * 30) > 0 ? 0.2 : 0;
        renderHitOverlay(ctx, 0.5, flash);
    }

    // Background
    renderSky(ctx, scrollOffset);
    renderRoad(ctx, scrollOffset);

    // Stations
    for (let station of game.getStations()) {
        const sy = station.y + scrollOffset;
        if (sy > -50 && sy < _renderGameHeight + 50) {
            const screenStation = { x: station.x, y: sy, childWaiting: station.childWaiting, collected: station.collected };
            renderStationShape(ctx, screenStation);
        }
    }

    // Obstacles
    for (let obs of game.getObstaclePool().getActiveObstacles()) {
        const oy = obs.y + scrollOffset;
        if (oy > -50 && oy < _renderGameHeight + 50) {
            if (obs.type === 'cone') renderCone(ctx, obs.x, oy);
            else if (obs.type === 'cow') renderCow(ctx, obs.x, oy, obs.direction);
            else if (obs.type === 'tree') renderTree(ctx, obs.x, oy);
        }
    }

    // Stars
    for (let star of game.getStarPool().getActiveStars()) {
        const sy = star.y + scrollOffset;
        if (sy > -30 && sy < _renderGameHeight + 30) {
            renderStarShape(ctx, star);
        }
    }

    // Power-ups
    for (let pu of game.getPowerUpPool().getActivePowerUps()) {
        const py = pu.y + scrollOffset;
        if (py > -30 && py < _renderGameHeight + 30) {
            renderPowerUpShape(ctx, pu);
        }
    }

    // Bus
    renderBus(ctx, game.getBus());

    // Power-up effects (after bus so they render on top)
    renderPowerUpEffects(ctx, game);

    // Particles
    game.getParticles().render(ctx);

    // UI
    const sm = game.getScoreManager();
    renderHearts(ctx, sm.lives, sm.maxLives, 8, 16);
    renderStarCounter(ctx, sm.starsCollected, _renderGameWidth - 60, 12);
    renderFriendCounter(ctx, sm.friendsCollected, sm.totalFriends, _renderGameWidth - 60, 28);
    renderPowerUpIndicators(ctx, game);

    ctx.restore();
}

// ============================================================================
// AUDIO — Web Audio API synthesis
// ============================================================================

class AudioManager {
    constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.bgmGain = null;
        this.sfxGain = null;
        this.bgmInterval = null;
        this.isPlaying = false;
        this.muted = false;
    }

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.5;
        this.masterGain.connect(this.ctx.destination);
        this.bgmGain = this.ctx.createGain();
        this.bgmGain.gain.value = 0.25;
        this.bgmGain.connect(this.masterGain);
        this.sfxGain = this.ctx.createGain();
        this.sfxGain.gain.value = 0.5;
        this.sfxGain.connect(this.masterGain);
    }

    _tone(freq, dur, type = 'square', vol = 0.4, delay = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime + delay;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g);
        g.connect(this.sfxGain);
        osc.start(t);
        osc.stop(t + dur + 0.05);
    }

    _sweep(f1, f2, dur, type, vol = 0.3, delay = 0) {
        if (!this.ctx || this.muted) return;
        const t = this.ctx.currentTime + delay;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f1, t);
        osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g);
        g.connect(this.sfxGain);
        osc.start(t);
        osc.stop(t + dur + 0.05);
    }

    playStarCollect() {
        this._sweep(880, 1760, 0.12, 'square', 0.35);
    }

    playHit() {
        this._sweep(250, 80, 0.2, 'triangle', 0.3);
    }

    playStationArrive() {
        this._tone(523, 0.15, 'square', 0.3, 0);
        this._tone(392, 0.2, 'square', 0.3, 0.15);
    }

    playStationComplete() {
        this._tone(523, 0.1, 'square', 0.3, 0);
        this._tone(659, 0.1, 'square', 0.3, 0.1);
        this._tone(784, 0.15, 'square', 0.3, 0.2);
        this._tone(1047, 0.3, 'square', 0.25, 0.3);
    }

    playVictory() {
        [523, 659, 784, 1047].forEach((f, i) => this._tone(f, 0.3, 'square', 0.25, i * 0.15));
    }

    playBusMove() {
        this._tone(200, 0.05, 'sawtooth', 0.1);
    }

    playPowerUpCollect() {
        // Suono arcade power-up: arpeggio ascendente
        this._tone(523, 0.1, 'square', 0.3, 0);
        this._tone(659, 0.1, 'square', 0.3, 0.08);
        this._tone(784, 0.1, 'square', 0.3, 0.16);
        this._tone(1047, 0.2, 'square', 0.25, 0.24);
    }

    playPowerUpShield() {
        // Suono scudo: tintinnio metallico
        this._tone(800, 0.15, 'triangle', 0.25, 0);
        this._tone(1200, 0.1, 'triangle', 0.2, 0.1);
    }

    playPowerUpMagnet() {
        // Suono magnete: ronzio
        this._sweep(400, 600, 0.3, 'sawtooth', 0.15);
    }

    playPowerUpSlowmo() {
        // Suono slow-mo: whirring discendente
        this._sweep(600, 200, 0.4, 'sine', 0.2);
    }

    playPowerUpJump() {
        // Suono salto: boing
        this._sweep(300, 500, 0.15, 'triangle', 0.25);
        this._sweep(500, 300, 0.1, 'triangle', 0.2, 0.1);
    }

    playPowerUpDouble() {
        // Suono stelle x2: ding dorato
        this._tone(880, 0.1, 'square', 0.3, 0);
        this._tone(1320, 0.15, 'square', 0.25, 0.08);
    }

    startBGM() {
        if (!this.ctx || this.isPlaying) return;
        this.isPlaying = true;
        const mel = [262, 330, 392, 523, 392, 523, 659, 784];
        let idx = 0;
        const play = () => {
            if (!this.isPlaying) return;
            const f = mel[idx % mel.length];
            if (!this.muted) {
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = f;
                g.gain.value = 0.08;
                osc.connect(g);
                g.connect(this.bgmGain);
                osc.start(t);
                osc.stop(t + 0.2);
            }
            idx++;
            this.bgmTimeout = setTimeout(play, 250);
        };
        play();
    }

    stopBGM() {
        this.isPlaying = false;
        if (this.bgmTimeout) clearTimeout(this.bgmTimeout);
    }

    setMuted(m) { this.muted = m; }
}

// ============================================================================
// MAIN — Game Runner
// ============================================================================

class GameRunner {
    constructor() {
        this.canvas = null;
        this.ctx = null;
        this.game = null;
        this.audio = null;
        this.running = false;
        this.lastTime = 0;
        this.accumulator = 0;
        this.audioInitialized = false;
        this._hitState = { active: false, shakeIntensity: 0, flashAlpha: 0 };
    }

    init(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = _renderGameWidth;
        this.canvas.height = _renderGameHeight;
        this._resize();
        window.addEventListener('resize', () => this._resize());

        this.game = new Game();
        this.game.init();
        this.audio = new AudioManager();

        // Input events
        window.addEventListener('keydown', () => this._ensureAudio());
        window.addEventListener('pointerdown', () => this._ensureAudio());
        window.addEventListener('touchstart', () => this._ensureAudio(), { passive: true });

        this._bindInput();
    }

    _resize() {
        const scale = Math.max(1, Math.min(
            Math.floor(window.innerWidth / _renderGameWidth),
            Math.floor(window.innerHeight / _renderGameHeight),
            4
        ));
        this.canvas.style.width = (_renderGameWidth * scale) + 'px';
        this.canvas.style.height = (_renderGameHeight * scale) + 'px';
    }

    _ensureAudio() {
        if (!this.audioInitialized) {
            this.audioInitialized = true;
            this.audio.init();
            if (this.game.getState() === STATE.PLAYING || this.game.getState() === STATE.INTRO) {
                this.audio.startBGM();
            }
        }
    }

    _bindInput() {
        window.addEventListener('keydown', (e) => {
            if (this.game) this.game.input.keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (this.game) this.game.input.keys[e.code] = false;
        });
        window.addEventListener('touchstart', (e) => {
            if (!this.game || !this.game.input) return;
            this.game.input.isTouching = true;
            this.game.input.touchStartX = e.touches[0].clientX;
            this.game.input.touchCurrentX = e.touches[0].clientX;
            this.game.input.dragDeltaX = 0;
        }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            if (!this.game || !this.game.input || !this.game.input.isTouching) return;
            this.game.input.touchCurrentX = e.touches[0].clientX;
            this.game.input.dragDeltaX = this.game.input.touchCurrentX - this.game.input.touchStartX;
        }, { passive: true });
        window.addEventListener('touchend', () => {
            if (!this.game || !this.game.input) return;
            this.game.input.isTouching = false;
            this.game.input.dragDeltaX = 0;
        });
    }

    start() {
        if (this.running) return;
        this.running = true;
        this.lastTime = performance.now();
        requestAnimationFrame((t) => this._loop(t));
    }

    stop() {
        this.running = false;
        this.audio.stopBGM();
    }

    _loop(timestamp) {
        if (!this.running) return;

        const frameTime = timestamp - this.lastTime;
        this.lastTime = timestamp;
        this.accumulator += frameTime;
        if (this.accumulator > FIXED_TIMESTEP * 5 * 1000) this.accumulator = FIXED_TIMESTEP * 5 * 1000;

        while (this.accumulator >= FIXED_TIMESTEP * 1000) {
            this.game.update(FIXED_TIMESTEP);
            this.accumulator -= FIXED_TIMESTEP * 1000;
        }

        // Audio triggers
        this._checkAudioTriggers();

        this._render();
        requestAnimationFrame((t) => this._loop(t));
    }

    _prevState = STATE.TITLE;
    _prevStars = 0;
    _prevLives = 3;
    _prevFriends = 0;
    _prevPowerUps = {};

    _checkAudioTriggers() {
        const state = this.game.getState();
        const sm = this.game.getScoreManager();

        // State transitions
        if (state !== this._prevState) {
            if (state === STATE.PLAYING || state === STATE.INTRO) {
                this.audio.startBGM();
            }
            if (state === STATE.WIN) {
                this.audio.stopBGM();
                this.audio.playVictory();
            }
            if (state === STATE.LEVEL_COMPLETE) {
                this.audio.playStationComplete();
            }
            if (this._prevState !== STATE.STATION_STOP && state === STATE.STATION_STOP) {
                this.audio.playStationArrive();
            }
            this._prevState = state;
        }

        // Star collected
        if (sm.starsCollected > this._prevStars) {
            this.audio.playStarCollect();
            this._prevStars = sm.starsCollected;
        }

        // Life lost
        if (sm.lives < this._prevLives) {
            this.audio.playHit();
            this._prevLives = sm.lives;
        }
        // Sync after level reload (lives reset to 3, _prevLives might be 0)
        if (sm.lives > this._prevLives) {
            this._prevLives = sm.lives;
            this._prevStars = sm.starsCollected;
            this._prevFriends = sm.friendsCollected;
        }

        // Friend collected
        if (sm.friendsCollected > this._prevFriends) {
            this.audio.playStationComplete();
            this._prevFriends = sm.friendsCollected;
        }

        // Power-up activation audio
        const activePowerUps = this.game.getActivePowerUps();
        for (const type of ['shield', 'magnet', 'slowmo', 'jump', 'double']) {
            if (activePowerUps[type] && !this._prevPowerUps[type]) {
                this.audio.playPowerUpCollect();
                if (type === 'shield') this.audio.playPowerUpShield();
                else if (type === 'magnet') this.audio.playPowerUpMagnet();
                else if (type === 'slowmo') this.audio.playPowerUpSlowmo();
                else if (type === 'jump') this.audio.playPowerUpJump();
                else if (type === 'double') this.audio.playPowerUpDouble();
            }
        }
        this._prevPowerUps = { ...activePowerUps };
    }

    _render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, _renderGameWidth, _renderGameHeight);

        const state = this.game.getState();

        if (state === STATE.TITLE) {
            this._renderTitle();
        } else if (state === STATE.WIN) {
            this._renderWin();
        } else if (state === STATE.GAME_OVER) {
            this._renderGameOver();
        } else {
            doRender(ctx, this.game);
            this._renderOverlay(state);
        }
    }

    _renderTitle() {
        const ctx = this.ctx;
        renderSky(ctx, 0);
        renderRoad(ctx, 0);

        // Bus fermo al centro
        const demoBus = { x: _renderGameWidth / 2 - 22, y: _renderGameHeight - 100, width: 45, height: 80, tilt: 0, blinkOn: true, doorsOpen: false, isAtStation: false, isHit: false, hitTimer: 0 };
        renderBus(ctx, demoBus);
        this.game.getParticles().render(ctx);

        // Titolo
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 40, _renderGameWidth, 80);
        ctx.fillStyle = COLORS.YELLOW_BUS;
        ctx.font = 'bold 28px Fredoka One, Comic Sans MS, cursive';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('LEONE BUS', _renderGameWidth / 2, 65);
        ctx.fillStyle = '#FFF';
        ctx.font = '14px Fredoka One, Comic Sans MS, cursive';
        ctx.fillText('Il Giorno dello Scuolabus', _renderGameWidth / 2, 90);
        ctx.font = '12px Fredoka One, Comic Sans MS, cursive';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('▶ tocca per iniziare ◀', _renderGameWidth / 2, 130);
    }

    _renderWin() {
        const ctx = this.ctx;
        ctx.fillStyle = '#1a3a2a';
        ctx.fillRect(0, 0, _renderGameWidth, _renderGameHeight);

        // Stars sparkles
        this.game.getParticles().render(ctx);

        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 36px Fredoka One, Comic Sans MS, cursive';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('BRAVO!', _renderGameWidth / 2, 90);

        const sm = this.game.getScoreManager();
        ctx.fillStyle = '#FFF';
        ctx.font = '16px Fredoka One, Comic Sans MS, cursive';
        ctx.fillText('Stelle: ' + sm.starsCollected, _renderGameWidth / 2, 135);
        ctx.fillText('Amici: ' + sm.friendsCollected + '/' + sm.totalFriends, _renderGameWidth / 2, 158);

        ctx.fillStyle = '#FFD700';
        ctx.font = '12px Fredoka One, Comic Sans MS, cursive';
        ctx.fillText('▶ tocca per ricominciare ◀', _renderGameWidth / 2, 200);
    }

    _renderGameOver() {
        const ctx = this.ctx;
        ctx.fillStyle = '#2a1a2a';
        ctx.fillRect(0, 0, _renderGameWidth, _renderGameHeight);

        // Cuori vuoti
        const heartSpacing = 40;
        const heartsStartX = _renderGameWidth / 2 - heartSpacing;
        for (let i = 0; i < 3; i++) {
            const hx = heartsStartX + i * heartSpacing;
            const hy = 130;
            ctx.fillStyle = '#555';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('♥', hx, hy);
        }

        // Titolo OH NO!
        ctx.fillStyle = '#FF4444';
        ctx.font = 'bold 36px Fredoka One, Comic Sans MS, cursive';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('OH NO!', _renderGameWidth / 2, 80);

        // Raccoglieremo poi i dati del punteggio
        const sm = this.game.getScoreManager();
        ctx.fillStyle = '#FFF';
        ctx.font = '14px Fredoka One, Comic Sans MS, cursive';
        ctx.fillText('Stelle raccolte: ' + sm.starsCollected, _renderGameWidth / 2, 175);
        ctx.fillText('Amici salvati: ' + sm.friendsCollected + '/' + sm.totalFriends, _renderGameWidth / 2, 195);

        ctx.fillStyle = '#FFD700';
        ctx.font = '12px Fredoka One, Comic Sans MS, cursive';
        ctx.fillText('▶ tocca per riprovare ◀', _renderGameWidth / 2, 230);
    }

    _renderOverlay(state) {
        const ctx = this.ctx;
        if (state === STATE.INTRO) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, _renderGameWidth, _renderGameHeight);
            ctx.fillStyle = '#FFF';
            ctx.font = '14px Fredoka One, Comic Sans MS, cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🚌 Guida Leone e raccogli gli amici!', _renderGameWidth / 2, 50);
        }
        if (state === STATE.STATION_STOP) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(0, 0, _renderGameWidth, _renderGameHeight);
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 18px Fredoka One, Comic Sans MS, cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('+1 AMICO!', _renderGameWidth / 2, 40);
        }
    }
}

// ============================================================================
// START
// ============================================================================

const runner = new GameRunner();
runner.init('game-canvas');
runner.start();
</script>
